<!DOCTYPE html>
<html lang="en" class="no-js">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Portal</title>
	<link rel="stylesheet" href="https://use.typekit.net/tas3jji.css">
	<link rel="stylesheet" type="text/css" href="css/base.css" />
	<script>document.documentElement.className = "js";</script>
</head>

<body class="loading">
	<main>
		<div class="intro-title"><img src="img/logo.png" alt="소노아임레디" style="max-width: 360px;"></div>
		<!-- 오직 이미지가 있는 섹션만 남김 -->
		<section class="content content--full">
			<div class="grid grid--split" data-grid-fourth>
				<div class="grid__img" style="background-image:url(img/Portal-1.png)">
					<div class="grid__img-content">
						<h3 class="img-title">소노 더해피450 <span class="img-title-sub">(장례전용상품)</span></h3>
						<p class="img-description">월 18,000원으로 준비하는 프리미엄 라이프케어</p>
						<div class="img-btns">
							<a href="#" class="img-link img-link--primary">더 알아보기</a>
							<a href="#" class="img-link img-link--secondary">가입 신청하기</a>
						</div>
					</div>
				</div>
				<div class="grid__img" style="background-image:url(img/Portal-2.jpeg)">
					<div class="grid__img-content">
						<h3 class="img-title">소노 스마트케어330 <span class="img-title-sub">(결합상조상품)</span></h3>
						<p class="img-description">가전 + 상조 + 환급, 하나로 묶으면 전부 됩니다</p>
						<div class="img-btns">
							<a href="#" class="img-link img-link--primary">더 알아보기</a>
							<a href="#" class="img-link img-link--secondary">가입 신청하기</a>
						</div>
					</div>
				</div>
			</div>
		</section>
	</main>
	<!-- JavaScript dependencies -->
	<script src="js/gsap.min.js"></script>
	<script src="js/imagesloaded.pkgd.min.js"></script>
	<script type="module" src="js/index.js"></script>
</body>

</html>
